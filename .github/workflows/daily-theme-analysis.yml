name: Daily Theme Analysis

on:
  # 외부 cron-job(workflow_dispatch)으로 실행:
  #   KST 09:05, 09:28 (월~금)
  workflow_dispatch:
    inputs:
      skip_news:
        description: "뉴스 수집 건너뛰기"
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  send-report:
    concurrency:
      group: daily-theme-analysis
      cancel-in-progress: false
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Notify start via Telegram
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: |
          MESSAGE="<b>[THEME_ANALYSIS][Daily Theme Analysis] 시작</b>
          Gemini AI 기반 당일 테마 분석 + 리포트 생성 + Telegram 전송"
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
            -d chat_id="${CHAT_ID}" \
            -d text="${MESSAGE}" \
            -d parse_mode="HTML"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Verify credentials
        env:
          KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: |
          if [ -z "$KIS_APP_KEY" ] || [ -z "$KIS_APP_SECRET" ]; then
            echo "::error::KIS API credentials not configured"
            exit 1
          fi
          if [ -z "$TELEGRAM_TOKEN" ] || [ -z "$CHAT_ID" ]; then
            echo "::error::Telegram credentials not configured"
            exit 1
          fi
          echo "All credentials verified"

      # KIS 토큰 캐시 (24시간 유효)
      - name: Get date for cache key
        id: cache-date
        run: echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Restore KIS token cache
        uses: actions/cache@v4
        with:
          path: .kis_token_cache.json
          key: kis-token-${{ steps.cache-date.outputs.date }}
          restore-keys: kis-token-

      - name: Run theme analysis
        id: analysis
        env:
          KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GEMINI_API_KEY_01: ${{ secrets.GEMINI_API_KEY_01 }}
          GEMINI_API_KEY_02: ${{ secrets.GEMINI_API_KEY_02 }}
          GEMINI_API_KEY_03: ${{ secrets.GEMINI_API_KEY_03 }}
          GEMINI_API_KEY_04: ${{ secrets.GEMINI_API_KEY_04 }}
          GEMINI_API_KEY_05: ${{ secrets.GEMINI_API_KEY_05 }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          if [ "${{ github.event.inputs.skip_news }}" == "true" ]; then
            python main.py --skip-news 2>&1 | tee /tmp/task.log
          else
            python main.py 2>&1 | tee /tmp/task.log
          fi

      - name: Save KIS token cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .kis_token_cache.json
          key: kis-token-${{ steps.cache-date.outputs.date }}

      - name: Commit data to repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if [ -f frontend/public/data/latest.json ]; then
            # 수집된 데이터 백업
            mkdir -p /tmp/data_backup
            cp frontend/public/data/latest.json /tmp/data_backup/
            [ -f frontend/public/data/history-index.json ] && cp frontend/public/data/history-index.json /tmp/data_backup/
            [ -d frontend/public/data/history ] && cp -r frontend/public/data/history /tmp/data_backup/

            # push 경합 시 최대 3회 재시도
            for attempt in 1 2 3; do
              echo "=== Push attempt $attempt ==="

              git fetch origin main
              git reset --hard origin/main

              # 수집된 데이터 복원
              cp /tmp/data_backup/latest.json frontend/public/data/
              [ -f /tmp/data_backup/history-index.json ] && cp /tmp/data_backup/history-index.json frontend/public/data/
              [ -d /tmp/data_backup/history ] && cp -r /tmp/data_backup/history frontend/public/data/

              git add frontend/public/data/latest.json
              [ -f frontend/public/data/history-index.json ] && git add frontend/public/data/history-index.json
              git add frontend/public/data/history/*.json 2>/dev/null || true

              if git diff --staged --quiet; then
                echo "No changes to commit"
                exit 0
              fi

              KST_TIME=$(TZ='Asia/Seoul' date +'%Y-%m-%d %H:%M')
              git commit -m "Update stock data - $KST_TIME KST"

              if git push origin main; then
                echo "Data committed and pushed"
                exit 0
              fi

              echo "Push failed (attempt $attempt), retrying in 5s..."
              sleep 5
            done

            echo "Push failed after 3 attempts"
            exit 1
          else
            echo "No data file found"
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_GITHUB_TOKEN: ${{ secrets.VITE_GITHUB_PAT }}
          VITE_GITHUB_REPO: xxonbang/theme-analyzer
          VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

      - name: Notify completion via Telegram
        if: always()
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: |
          ANALYSIS="${{ steps.analysis.outcome }}"
          JOB="${{ job.status }}"

          if [ "$ANALYSIS" = "success" ] && [ "$JOB" = "success" ]; then
            MESSAGE="<b>[THEME_ANALYSIS][Daily Theme Analysis] 완료</b>
          Gemini AI 기반 당일 테마 분석 + 리포트 생성 + Telegram 전송"
          elif [ "$ANALYSIS" = "success" ]; then
            MESSAGE="<b>[THEME_ANALYSIS][Daily Theme Analysis] 완료 (배포 오류)</b>
          분석·전송 성공, 빌드/배포 단계에서 오류 발생"
          else
            ERROR=$(tail -20 /tmp/task.log 2>/dev/null || echo "로그 없음")
            MESSAGE="<b>[THEME_ANALYSIS][Daily Theme Analysis] 실패</b>
          Gemini AI 기반 당일 테마 분석 + 리포트 생성 + Telegram 전송
          <pre>${ERROR}</pre>"
          fi
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
            -d chat_id="${CHAT_ID}" \
            -d text="${MESSAGE}" \
            -d parse_mode="HTML"

  deploy:
    concurrency:
      group: pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: send-report
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
