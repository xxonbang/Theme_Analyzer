name: Collect Investor Data

on:
  # 스케줄은 외부 cron-job(workflow_dispatch 트리거)으로 실행
  # 권장 시각 (KST, 가집계 입력시간 + 5분 여유):
  #   09:35, 10:05, 11:35, 13:25, 14:35, 15:45, 18:05
  #
  # 수집 항목:
  #   - 수급(외국인/기관/개인 순매수)
  #   - 거래량 TOP30
  #   - 거래대금 TOP30
  #   - 등락률 TOP30 (fluctuation + fluctuation_direct)
  #   - 신규 진입 종목: history, criteria, member 자동 보충
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  collect:
    concurrency:
      group: investor-data
      cancel-in-progress: true
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Notify start via Telegram
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: |
          MESSAGE="<b>[THEME_ANALYSIS][Collect Investor Data] 시작</b>
          수급 데이터 수집 (외국인/기관 매매)"
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
            -d chat_id="${CHAT_ID}" \
            -d text="${MESSAGE}" \
            -d parse_mode="HTML"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Get date for cache key
        id: cache-date
        run: echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Restore KIS token cache
        uses: actions/cache@v4
        with:
          path: .kis_token_cache.json
          key: kis-token-${{ steps.cache-date.outputs.date }}
          restore-keys: kis-token-

      - name: Collect investor data
        id: analysis
        env:
          KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python collect_investor_data.py 2>&1 | tee /tmp/task.log

      - name: Save KIS token cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .kis_token_cache.json
          key: kis-token-${{ steps.cache-date.outputs.date }}

      - name: Commit data to repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # 수집된 데이터 백업
          cp frontend/public/data/latest.json /tmp/latest_collected.json

          # push 경합 시 최대 3회 재시도
          for attempt in 1 2 3; do
            echo "=== Push attempt $attempt ==="

            git fetch origin main
            git reset --hard origin/main

            # 원격의 daily-theme-analysis 필드 보존 (레이스 컨디션 방지)
            python3 scripts/merge_workflow_data.py save-main

            # 수집된 데이터 복원 후 커밋
            cp /tmp/latest_collected.json frontend/public/data/latest.json

            # 원격의 daily-theme-analysis 필드 병합 (timestamp가 더 최신이면)
            python3 scripts/merge_workflow_data.py merge-main

            git add frontend/public/data/latest.json

            if git diff --staged --quiet; then
              echo "No changes to commit"
              exit 0
            fi

            KST_TIME=$(TZ='Asia/Seoul' date +'%Y-%m-%d %H:%M')
            git commit -m "Update investor data - $KST_TIME KST"

            if git push origin main; then
              echo "Data committed and pushed"
              exit 0
            fi

            echo "Push failed (attempt $attempt), retrying in 5s..."
            sleep 5
          done

          echo "Push failed after 3 attempts"
          exit 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_GITHUB_TOKEN: ${{ secrets.VITE_GITHUB_PAT }}
          VITE_GITHUB_REPO: xxonbang/theme-analyzer
          VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

      - name: Notify completion via Telegram
        if: always()
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: |
          ANALYSIS="${{ steps.analysis.outcome }}"
          JOB="${{ job.status }}"

          if [ "$ANALYSIS" = "success" ] && [ "$JOB" = "success" ]; then
            MESSAGE="<b>[THEME_ANALYSIS][Collect Investor Data] 완료</b>
          수급 데이터 수집 (외국인/기관 매매)"
          elif [ "$ANALYSIS" = "success" ]; then
            MESSAGE="<b>[THEME_ANALYSIS][Collect Investor Data] 완료 (배포 오류)</b>
          수집 성공, 빌드/배포 단계에서 오류 발생"
          else
            ERROR=$(tail -20 /tmp/task.log 2>/dev/null || echo "로그 없음")
            MESSAGE="<b>[THEME_ANALYSIS][Collect Investor Data] 실패</b>
          수급 데이터 수집 (외국인/기관 매매)
          <pre>${ERROR}</pre>"
          fi
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
            -d chat_id="${CHAT_ID}" \
            -d text="${MESSAGE}" \
            -d parse_mode="HTML"

  deploy:
    concurrency:
      group: pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: collect
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
