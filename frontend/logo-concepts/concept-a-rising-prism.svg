<svg viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="200" height="200" rx="32" fill="#1a1a2e"/>

  <!-- Logo container (simulating the primary gradient box) -->
  <rect x="30" y="30" width="140" height="140" rx="24" fill="url(#bgGrad-a)"/>

  <defs>
    <linearGradient id="bgGrad-a" x1="30" y1="30" x2="170" y2="170" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#3730a3"/>
    </linearGradient>
  </defs>

  <!-- Bar 1 - shortest, most transparent -->
  <rect x="56" y="118" width="22" height="36" rx="5" fill="white" opacity="0.3"/>
  <!-- Bar 2 - medium -->
  <rect x="89" y="90" width="22" height="64" rx="5" fill="white" opacity="0.55"/>
  <!-- Bar 3 - tallest, full opacity -->
  <rect x="122" y="58" width="22" height="96" rx="5" fill="white" opacity="0.9"/>

  <!-- Rising trend line -->
  <path
    d="M67 114 L100 86 L133 54"
    stroke="white"
    stroke-width="5"
    stroke-linecap="round"
    stroke-linejoin="round"
    opacity="0.7"
  />

  <!-- Insight dot at peak -->
  <circle cx="133" cy="54" r="7" fill="white"/>
</svg>
