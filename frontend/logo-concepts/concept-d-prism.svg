<svg viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="200" height="200" rx="32" fill="#0f0f1a"/>

  <defs>
    <!-- Main diamond gradient - deep indigo to electric blue -->
    <linearGradient id="d-face1" x1="70" y1="60" x2="130" y2="140" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="d-face2" x1="100" y1="55" x2="140" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#3730a3"/>
    </linearGradient>
    <linearGradient id="d-face3" x1="60" y1="100" x2="100" y2="155" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4338ca"/>
      <stop offset="100%" stop-color="#312e81"/>
    </linearGradient>
    <!-- Highlight accent -->
    <linearGradient id="d-highlight" x1="85" y1="65" x2="105" y2="95" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#c7d2fe" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#818cf8" stop-opacity="0"/>
    </linearGradient>
    <!-- Ambient glow -->
    <radialGradient id="d-glow" cx="100" cy="100" r="60" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <!-- Light refraction line gradient -->
    <linearGradient id="d-refract" x1="65" y1="90" x2="140" y2="105" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f0abfc" stop-opacity="0"/>
      <stop offset="20%" stop-color="#c4b5fd"/>
      <stop offset="50%" stop-color="#93c5fd"/>
      <stop offset="80%" stop-color="#6ee7b7"/>
      <stop offset="100%" stop-color="#6ee7b7" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Ambient glow behind -->
  <circle cx="100" cy="100" r="60" fill="url(#d-glow)"/>

  <!-- Diamond - 3 faceted faces creating depth -->
  <!-- Left face -->
  <path d="M100 52 L60 100 L100 148 Z" fill="url(#d-face3)"/>
  <!-- Right face -->
  <path d="M100 52 L140 100 L100 148 Z" fill="url(#d-face2)"/>
  <!-- Top-center facet (catching light) -->
  <path d="M100 52 L78 88 L100 100 L122 88 Z" fill="url(#d-face1)"/>
  <!-- Bottom-center facet (shadow) -->
  <path d="M100 148 L78 112 L100 100 L122 112 Z" fill="#2e1065" opacity="0.7"/>

  <!-- Inner facet lines - subtle -->
  <line x1="100" y1="52" x2="100" y2="148" stroke="#a5b4fc" stroke-width="0.5" opacity="0.3"/>
  <line x1="60" y1="100" x2="140" y2="100" stroke="#a5b4fc" stroke-width="0.5" opacity="0.2"/>
  <line x1="78" y1="88" x2="122" y2="112" stroke="#a5b4fc" stroke-width="0.3" opacity="0.15"/>
  <line x1="122" y1="88" x2="78" y2="112" stroke="#a5b4fc" stroke-width="0.3" opacity="0.15"/>

  <!-- Light highlight on top-left edge -->
  <path d="M100 52 L78 88 L100 100 Z" fill="url(#d-highlight)"/>

  <!-- Refraction spectrum line cutting across -->
  <line x1="62" y1="93" x2="138" y2="107" stroke="url(#d-refract)" stroke-width="2" stroke-linecap="round"/>

  <!-- Subtle edge highlights -->
  <path d="M100 52 L60 100" stroke="#c7d2fe" stroke-width="0.8" opacity="0.4"/>
  <path d="M100 52 L140 100" stroke="#a5b4fc" stroke-width="0.5" opacity="0.25"/>

  <!-- Tiny specular dot -->
  <circle cx="92" cy="76" r="2" fill="white" opacity="0.5"/>
  <circle cx="92" cy="76" r="1" fill="white" opacity="0.8"/>
</svg>
