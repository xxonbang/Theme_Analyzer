<svg viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="200" height="200" rx="32" fill="#1a1a2e"/>

  <!-- Logo container -->
  <rect x="30" y="30" width="140" height="140" rx="24" fill="url(#bgGrad-b)"/>

  <defs>
    <linearGradient id="bgGrad-b" x1="30" y1="30" x2="170" y2="170" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#3730a3"/>
    </linearGradient>
  </defs>

  <!-- Outer scope ring -->
  <circle cx="100" cy="100" r="52" stroke="white" stroke-width="4" opacity="0.25"/>

  <!-- Inner focus ring (dashed) -->
  <circle cx="100" cy="100" r="36" stroke="white" stroke-width="2.5" opacity="0.12" stroke-dasharray="6 8"/>

  <!-- Theme line 1 - from bottom-left -->
  <path d="M52 148 L76 120 L100 96" stroke="white" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.4"/>

  <!-- Theme line 2 - from left center -->
  <path d="M46 104 L72 100 L100 96" stroke="white" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>

  <!-- Theme line 3 - breakout to top-right -->
  <path d="M100 96 L130 76 L154 56" stroke="white" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>

  <!-- Convergence point - outer glow -->
  <circle cx="100" cy="96" r="10" fill="white" opacity="0.25"/>
  <!-- Convergence point - core -->
  <circle cx="100" cy="96" r="6" fill="white" opacity="0.9"/>
</svg>
