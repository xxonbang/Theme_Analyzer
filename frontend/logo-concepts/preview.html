<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Theme Analyzer - Logo Redesign Preview</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a;
      color: #d4d4d8;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      padding: 48px 40px;
      min-height: 100vh;
    }
    h1 {
      font-size: 32px;
      font-weight: 200;
      letter-spacing: -1px;
      color: #fafafa;
      margin-bottom: 6px;
    }
    .subtitle { color: #52525b; font-size: 14px; margin-bottom: 56px; }
    .concept { margin-bottom: 72px; }
    .concept-header {
      display: flex;
      align-items: baseline;
      gap: 12px;
      margin-bottom: 6px;
    }
    .concept-title {
      font-size: 20px;
      font-weight: 600;
      color: #fafafa;
    }
    .concept-tag {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 999px;
      font-weight: 500;
    }
    .tag-dark { background: #1e293b; color: #38bdf8; }
    .tag-blue { background: #1e3a5f; color: #93c5fd; }
    .concept-desc { color: #71717a; font-size: 13px; margin-bottom: 28px; line-height: 1.6; }
    .sizes {
      display: flex;
      align-items: flex-end;
      gap: 36px;
      flex-wrap: wrap;
    }
    .size-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }
    .icon-wrap {
      background: #18181b;
      border: 1px solid #27272a;
      border-radius: 12px;
      padding: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .icon-wrap svg { display: block; }
    .size-meta { text-align: center; }
    .size-label {
      font-size: 12px;
      color: #a1a1aa;
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-weight: 500;
    }
    .size-use {
      font-size: 10px;
      color: #3f3f46;
      display: block;
      margin-top: 2px;
    }
    .dl-btn {
      margin-top: 6px;
      font-size: 10px;
      padding: 3px 10px;
      border: 1px solid #27272a;
      border-radius: 4px;
      background: transparent;
      color: #71717a;
      cursor: pointer;
      transition: all .15s;
    }
    .dl-btn:hover { border-color: #52525b; color: #d4d4d8; background: #27272a; }
    .divider {
      border: none;
      border-top: 1px solid #1c1c1e;
      margin: 0 0 72px;
    }
    .actions {
      margin-top: 32px;
      display: flex;
      gap: 12px;
    }
    .action-btn {
      font-size: 13px;
      padding: 8px 20px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-weight: 500;
      transition: all .15s;
    }
    .action-primary { background: #2563eb; color: white; }
    .action-primary:hover { background: #1d4ed8; }
    .action-secondary { background: #27272a; color: #a1a1aa; }
    .action-secondary:hover { background: #3f3f46; color: #d4d4d8; }
  </style>
</head>
<body>

<h1>Theme Analyzer Logo Redesign</h1>
<p class="subtitle">현재 로고의 차트 + AI 분석 아이덴티티를 계승한 모던 로고 컨셉 2종</p>

<div id="app"></div>

<script>
const SIZES = [
  { px: 512, label: '512', use: 'PWA icon' },
  { px: 192, label: '192', use: 'PWA icon' },
  { px: 128, label: '128', use: 'apple-touch' },
  { px: 64,  label: '64',  use: 'favicon HD' },
  { px: 32,  label: '32',  use: 'favicon' },
  { px: 16,  label: '16',  use: 'tab icon' },
];

// ─── Concept A: Midnight Insight ───
function svgA(uid) {
  return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" data-uid="${uid}">
  <defs>
    <linearGradient id="${uid}_bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop stop-color="#070b16"/><stop offset="1" stop-color="#0f1a30"/>
    </linearGradient>
    <linearGradient id="${uid}_ln" x1="96" y1="370" x2="420" y2="130" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0369a1"/><stop offset=".5" stop-color="#0ea5e9"/><stop offset="1" stop-color="#38bdf8"/>
    </linearGradient>
    <linearGradient id="${uid}_af" x1="256" y1="130" x2="256" y2="410" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0ea5e9" stop-opacity=".18"/><stop offset="1" stop-color="#0ea5e9" stop-opacity="0"/>
    </linearGradient>
    <filter id="${uid}_gl"><feGaussianBlur stdDeviation="16"/></filter>
    <filter id="${uid}_dg"><feGaussianBlur stdDeviation="10"/></filter>
    <pattern id="${uid}_gd" width="44" height="44" patternUnits="userSpaceOnUse">
      <circle cx="22" cy="22" r="1" fill="white"/>
    </pattern>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#${uid}_bg)"/>
  <rect x="68" y="68" width="376" height="376" fill="url(#${uid}_gd)" opacity=".025"/>
  <path d="M96 370L184 286L258 322L344 198L424 126V410H96Z" fill="url(#${uid}_af)"/>
  <polyline points="96,370 184,286 258,322 344,198 424,126" stroke="#0ea5e9" stroke-width="44" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#${uid}_gl)" opacity=".35"/>
  <polyline points="96,370 184,286 258,322 344,198 424,126" stroke="url(#${uid}_ln)" stroke-width="32" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <polyline points="96,370 184,286 258,322 344,198 424,126" stroke="white" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity=".08"/>
  <circle cx="184" cy="286" r="7" fill="#0ea5e9" opacity=".5"/>
  <circle cx="258" cy="322" r="7" fill="#0ea5e9" opacity=".45"/>
  <circle cx="344" cy="198" r="8" fill="#22d3ee" opacity=".6"/>
  <circle cx="424" cy="126" r="30" fill="#38bdf8" filter="url(#${uid}_dg)" opacity=".3"/>
  <circle cx="424" cy="126" r="17" fill="#38bdf8"/>
  <circle cx="424" cy="126" r="7" fill="white" opacity=".92"/>
</svg>`;
}

// ─── Concept B: Royal Analysis ───
function svgB(uid) {
  return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" data-uid="${uid}">
  <defs>
    <linearGradient id="${uid}_bg" x1="0" y1="0" x2="450" y2="512" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1e3a8a"/><stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
    <radialGradient id="${uid}_rg" cx=".28" cy=".25" r=".75">
      <stop stop-color="white" stop-opacity=".1"/><stop offset="1" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="${uid}_af" x1="256" y1="126" x2="256" y2="410" gradientUnits="userSpaceOnUse">
      <stop stop-color="white" stop-opacity=".14"/><stop offset="1" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <filter id="${uid}_gl"><feGaussianBlur stdDeviation="14"/></filter>
    <filter id="${uid}_dg"><feGaussianBlur stdDeviation="8"/></filter>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#${uid}_bg)"/>
  <rect width="512" height="512" rx="112" fill="url(#${uid}_rg)"/>
  <line x1="184" y1="286" x2="344" y2="198" stroke="white" stroke-width="1.5" opacity=".06"/>
  <line x1="258" y1="322" x2="424" y2="126" stroke="white" stroke-width="1.5" opacity=".05"/>
  <line x1="96" y1="370" x2="344" y2="198" stroke="white" stroke-width="1" opacity=".04"/>
  <path d="M96 370L184 286L258 322L344 198L424 126V410H96Z" fill="url(#${uid}_af)"/>
  <polyline points="96,370 184,286 258,322 344,198 424,126" stroke="white" stroke-width="38" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#${uid}_gl)" opacity=".2"/>
  <polyline points="96,370 184,286 258,322 344,198 424,126" stroke="white" stroke-width="30" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity=".92"/>
  <circle cx="184" cy="286" r="6" fill="white" opacity=".35"/>
  <circle cx="258" cy="322" r="6" fill="white" opacity=".35"/>
  <circle cx="344" cy="198" r="7" fill="white" opacity=".5"/>
  <circle cx="424" cy="126" r="24" fill="white" filter="url(#${uid}_dg)" opacity=".2"/>
  <circle cx="424" cy="126" r="15" fill="white" opacity=".88"/>
  <circle cx="424" cy="126" r="6" fill="#2563eb"/>
</svg>`;
}

// ─── Render ───
const concepts = [
  {
    name: 'A. Midnight Insight',
    tag: 'DARK',
    tagClass: 'tag-dark',
    desc: '깊은 다크 네이비 배경 위에 시안(cyan) 네온 차트라인과 글로우 이펙트. 은은한 데이터 그리드 도트가 배경에 깔리고, 상승 추세 끝점에 밝은 인사이트 포인트. 프리미엄 테크 대시보드 느낌.',
    fn: svgA,
  },
  {
    name: 'B. Royal Analysis',
    tag: 'BLUE',
    tagClass: 'tag-blue',
    desc: '현재 로고의 로열 블루 색상을 계승하면서 미니멀하게 재구성. 화이트 차트라인과 반투명 에어리어 필. 노드 간 미세한 네트워크 연결선이 AI 분석 느낌을 표현. 친숙하면서 깔끔한 느낌.',
    fn: svgB,
  },
];

const app = document.getElementById('app');

concepts.forEach((c, ci) => {
  if (ci > 0) {
    const hr = document.createElement('hr');
    hr.className = 'divider';
    app.appendChild(hr);
  }

  const section = document.createElement('div');
  section.className = 'concept';

  const header = document.createElement('div');
  header.className = 'concept-header';
  header.innerHTML = `<span class="concept-title">${c.name}</span><span class="concept-tag ${c.tagClass}">${c.tag}</span>`;
  section.appendChild(header);

  const desc = document.createElement('p');
  desc.className = 'concept-desc';
  desc.textContent = c.desc;
  section.appendChild(desc);

  const sizesDiv = document.createElement('div');
  sizesDiv.className = 'sizes';

  SIZES.forEach(s => {
    const item = document.createElement('div');
    item.className = 'size-item';
    const uid = `c${ci}_${s.px}`;
    item.innerHTML = `
      <div class="icon-wrap">${c.fn(uid)}</div>
      <div class="size-meta">
        <span class="size-label">${s.label}×${s.label}</span>
        <span class="size-use">${s.use}</span>
      </div>
      <button class="dl-btn" onclick="downloadPng('${uid}', ${s.px})">PNG 다운로드</button>
    `;
    // Set svg size
    const svg = item.querySelector('svg');
    svg.setAttribute('width', s.px);
    svg.setAttribute('height', s.px);
    sizesDiv.appendChild(item);
  });

  section.appendChild(sizesDiv);
  app.appendChild(section);
});

// ─── PNG Download ───
function downloadPng(uid, size) {
  const svgEl = document.querySelector(`[data-uid="${uid}"]`);
  if (!svgEl) return;

  // Clone and set explicit size for rendering
  const clone = svgEl.cloneNode(true);
  clone.setAttribute('width', size);
  clone.setAttribute('height', size);

  const svgData = new XMLSerializer().serializeToString(clone);
  const img = new Image();

  img.onload = function() {
    const canvas = document.createElement('canvas');
    canvas.width = size;
    canvas.height = size;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(img, 0, 0, size, size);

    canvas.toBlob(function(blob) {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.download = `theme-analyzer-${uid.startsWith('c0') ? 'A' : 'B'}-${size}.png`;
      a.href = url;
      a.click();
      URL.revokeObjectURL(url);
    }, 'image/png');
  };

  img.src = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svgData);
}
</script>

</body>
</html>
